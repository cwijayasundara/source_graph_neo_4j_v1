services:
  neo4j:
    image: neo4j:5-community
    container_name: code-context-graph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: neo4j/please-change-me
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p please-change-me 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
